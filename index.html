<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promo Ninja — Achadinhos do dia</title>
<style>
  :root{--navy:#1E2A4A;--orange:#FF6B35;--yellow:#FFD23F;--green:#2ECC71;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,Arial,sans-serif;background:#0f1320;color:#fff;}
  header{background:var(--navy);text-align:center;padding:28px 16px;}
  header h1{font-size:30px;color:var(--orange);}
  header p{color:#c6cde0;margin-top:6px;}
  header a{display:inline-block;margin-top:14px;background:var(--green);color:#06301b;font-weight:800;text-decoration:none;padding:10px 22px;border-radius:999px;}
  .grid{max-width:1100px;margin:24px auto;padding:0 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .card{background:#1a2030;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid #2a3350;}
  .card .img{position:relative;background:#fff;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
  .card .img img{width:100%;height:100%;object-fit:contain;}
  .badge{position:absolute;top:8px;right:8px;background:var(--orange);color:#fff;font-weight:800;padding:5px 10px;border-radius:8px;font-size:14px;}
  .loja{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;text-transform:uppercase;}
  .card .body{padding:12px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .titulo{font-size:14px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px;}
  .de{color:#8b95ad;text-decoration:line-through;font-size:13px;}
  .por{color:var(--yellow);font-weight:800;font-size:22px;}
  .cupom{background:rgba(255,210,63,.15);border:1px dashed var(--yellow);color:var(--yellow);font-size:12px;padding:4px 8px;border-radius:6px;align-self:flex-start;}
  .btn{margin-top:auto;display:block;text-align:center;background:var(--orange);color:#fff;font-weight:800;text-decoration:none;padding:10px;border-radius:8px;}
  footer{text-align:center;color:#8b95ad;padding:30px 16px;font-size:13px;}
  footer a{color:var(--orange);}
  .vazio{text-align:center;color:#8b95ad;padding:60px 16px;}
</style>
</head>
<body>
  <header>
    <h1>🥷 Promo Ninja</h1>
    <p>Achadinhos verificados, todo dia. Preço garimpado nas sombras.</p>
    <a href="https://t.me/promoninjaofertas" target="_blank" rel="noopener">📲 Entrar no canal do Telegram</a>
  </header>
  <main class="grid" id="grid"><div class="vazio">Carregando ofertas...</div></main>
  <footer>
    Atualizado automaticamente · <a href="https://t.me/promoninjaofertas" target="_blank" rel="noopener">@promoninjaofertas</a><br>
    🔗 Links de afiliado · preço sujeito a alteração
  </footer>
<script>
  const fmt = (v) => 'R$ ' + Number(v||0).toFixed(2).replace('.', ',');
  fetch('catalog.json?t=' + Date.now())
    .then(r => r.json())
    .then(d => {
      const grid = document.getElementById('grid');
      const ofertas = (d.ofertas || []);
      if (!ofertas.length) { grid.innerHTML = '<div class="vazio">Sem ofertas no momento. Volte logo!</div>'; return; }
      grid.innerHTML = ofertas.map(o => {
        const desc = o.desconto ? `<span class="badge">-${o.desconto}%</span>` : '';
        const de = (o.de && o.de > o.por) ? `<span class="de">${fmt(o.de)}</span>` : '';
        const cupom = o.cupom ? `<span class="cupom">🎟️ ${o.cupom}</span>` : '';
        return `<div class="card"><div class="img">${desc}<span class="loja">${o.loja||''}</span><img src="${o.imagem}" alt="" loading="lazy"></div><div class="body"><div class="titulo">${o.titulo}</div>${de}<span class="por">${fmt(o.por)}</span>${cupom}<a class="btn" href="${o.link}" target="_blank" rel="noopener">🛒 Garantir agora</a></div></div>`;
      }).join('');
    })
    .catch(() => { document.getElementById('grid').innerHTML = '<div class="vazio">Não consegui carregar as ofertas.</div>'; });
</script>
</body>
</html>
